components:
  schemas:

    Error:
      type: object
      required:
        - mensaje
      properties:
        mensaje:
          type: string

    Ciudadano:
      type: object
      required:
        - nif_nie
        - nombre_apellidos
        - correo
        - telefono
        - genero
        - nacionalidad
        - fecha_nacimiento
        - certificados
        - activo
      properties:
        nif_nie:
          type: string
        nombre_apellidos:
          type: string
        correo:
          type: string
        telefono:
          type: string
        genero:
          type: string
          enum: ["M", "F"]
        nacionalidad:
          type: string
        fecha_nacimiento:
          type: string
          format: date
        certificados:
          type: array
          items:
            $ref: "#/components/schemas/Certificado"
        activo:
          type: boolean

    Empresa:
      type: object
      required:
        - cif
        - nombre
        - razon_social
        - correo
        - telefono
        - fecha_constitucion
        - sector
        - clasificacion
      properties:
        cif:
          type: string
        nombre:
          type: string
        razon_social:
          type: string
        correo:
          type: string
        telefono:
          type: string
        fecha_constitucion:
          type: string
          format: date
        sector:
          type: string
        clasificacion:
          type: string
          # Esta es la clasificación española
          enum: ["MICRO", "PEQUEÑA", "MEDIANA", "GRANDE"]

    Oferta:
      type: object
      required:
        - cif_empresa
        - titulo
        - descripcion
        - fecha_caducidad
        - modalidad_contrato
        - salario
      properties:
        codigo:
          type: string
        cif_empresa:
          type: string
        titulo:
          type: string
        descripcion:
          type: string
        fecha_caducidad:
          type: string
          format: date
        modalidad_contrato:
          type: string
          # Estos son los modelos de contrato en España, exceptuando el de pescadores
          # https://sepe.es/HomeSepe/empresas/Contratos-de-trabajo/modelos-contrato.html
          enum: ["INDEFINIDO", "TEMPORAL", "ALTERNANCIA", "PRÁCTICAS"]
        salario:
          # No es un número porque igual queremos poner un salario fijo, un rango, o algo distinto
          type: string

    Curso:
      type: object
      required:
        - titulo
        - descripcion
        - plazas
        - alumnos
        - fecha_inicio
        - fecha_fin
      properties:
        codigo:
          type: string
        titulo:
          type: string
        descripcion:
          type: string
        plazas:
          type: integer
        alumnos:
          type: array
          items:
            type: object
            required:
              - nif_nie
              - aprobado
            properties:
              nif_nie:
                type: string
              aprobado:
                type: boolean
        fecha_inicio:
          type: string
          format: date
        fecha_fin:
          type: string
          format: date

    Certificado:
      type: object
      required:
        - nif_nie
        - titulo
        - descripcion
        - codigo_curso
        - fecha_emision
      properties:
        codigo:
          type: string
        titulo:
          type: string
        descripcion:
          type: string
        nif_nie:
          type: string
        codigo_curso:
          type: string
        fecha_emision:
          type: string
          format: date

    Notificacion:
      type: object
      required:
        - nif_nie
        - titulo
        - cuerpo
        - medio
      properties:
        nif_nie:
          type: string
        titulo:
          type: string
        cuerpo:
          type: string
        medio:
          type: string
          enum: ["CORREO", "SMS"]
