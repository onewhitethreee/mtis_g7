openapi: '3.0.3'
info:
  title: MTIS Prática Grupal
  version: '0.2'

paths:

  # SERVICIO CIUDADANOS
  /ciudadanos:
    post:
      tags:
        - ciudadanos
      summary: Registrar a un nuevo ciudadano
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Ciudadano'
      responses:
        '200':
          description: Se ha creado correctamente
        '400':
          description: Los datos introducidos son incorrectos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
    get:
      tags:
        - ciudadanos
      summary: Consultar la lista de ciudadanos registrados
      parameters:
        - name: p
          in: query
          description: Número de página
          schema:
            type: integer
            default: 1
            minimum: 1
        - name: s
          in: query
          description: Número de entradas por página
          schema:
            type: integer
            default: 10
            maximum: 30
        - name: q
          in: query
          description: Tipo de orden para la fecha de creación
          schema:
            type: string
            enum: [ascendente, descendente]
            default: descendente
        - name: search
          in: query
          description: Filtrar por nombre o correo
          schema:
            type: string
      responses:
        '200':
          description: La consulta se ha realizado correctamente
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ciudadano"
        '500':
          description: Error interno del servidor
  /ciudadanos/{id}:
    delete:
      tags:
        - ciudadanos
      summary: Borrar un ciudadano a partir de su NIF o NIE
      parameters:
        - name: id
          in: path
          required: true
          description: NIF o NIE del ciudadano
          schema:
            type: string
      responses:
        '200':
          description: Se ha borrado correctamente
        '404':
          description: No existe tal entrada en la base de datos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
    put:
      tags:
        - ciudadanos
      summary: Modificar los datos de un ciudadano
      parameters:
        - name: id
          in: path
          required: true
          description: NIF o NIE del ciudadano
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Ciudadano'
      responses:
        '200':
          description: El ciudadano se ha modificado correctamente
        '404':
          description: No existe tal entrada en la base de datos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor
    get:
      tags:
        - ciudadanos
      summary: Consultar datos de un ciudadano a partir de su NIF o NIE
      parameters:
        - name: id
          in: path
          required: true
          description: NIF o NIE del ciudadano
          schema:
            type: string
      responses:
        '200':
          description: Se ha encontrado la entrada en base de datos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Ciudadano'
        '404':
          description: No existe tal entrada en la base de datos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Error interno del servidor

  # SERVICIO ELEGIBILIDAD
  /elegible/{oferta}/{ciudadano}:
    get:
      tags:
        - elegibilidad
      summary: Comprobar si un ciudadano es elegible para una oferta
      parameters:
        - name: oferta
          in: path
          required: true
          description: Código de la oferta
          schema:
            type: string
        - name: ciudadano
          in: path
          required: true
          description: NIF o NIE del ciudadano
          schema:
            type: string
      responses:
        '200':
          description: Se ha podido verificar la elegibilidad
          content:
            application/json:
              schema:
                type: object
                required:
                  - elegible
                properties:
                  elegible:
                    type: boolean
        '404':
          description: No existe tal entrada en la base de datos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error' 
        '500':
          description: Error interno del servidor

